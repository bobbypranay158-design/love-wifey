<!DOCTYPE html>
<html>
<head>
<title>My Wifey ❤️</title>

<style>

body{
margin:0;
font-family:Arial;
text-align:center;
color:white;
background:linear-gradient(180deg,#0f2027,#203a43,#2c5364);
overflow-x:hidden;
}

h1{
margin-top:60px;
font-size:55px;
}

p{
font-size:22px;
width:70%;
margin:auto;
}

.gallery{
margin-top:40px;
}

.gallery img{
width:240px;
border-radius:20px;
margin:15px;
box-shadow:0 10px 25px rgba(0,0,0,0.6);
transition:transform 0.4s;
}

.gallery img:hover{
transform:scale(1.1);
}

button{
margin-top:40px;
padding:15px 35px;
font-size:24px;
border:none;
border-radius:50px;
background:#ff4d6d;
color:white;
cursor:pointer;
}

#loveText{
display:none;
font-size:60px;
margin-top:40px;
color:#ffd1dc;
}

.fall{
position:fixed;
top:-20px;
animation:fall linear forwards;
}

@keyframes fall{
0%{transform:translateY(-20px);}
100%{transform:translateY(100vh);}
}

footer{
margin-top:200px;
font-size:20px;
opacity:0.8;
}

.heart-bg{
position:fixed;
top:0;
left:0;
font-size:18px;
color:#ff6b81;
animation:float 8s linear infinite;
}

@keyframes float{
0%{transform:translateY(100vh);}
100%{transform:translateY(-10vh);}
}

</style>

</head>

<body>

<h1>Wifey ❤️ Husband</h1>

<p>
My beautiful wifey,  
You are my happiness, my heart, and my forever.  
Every moment with you is magical.  
I promise to love you today, tomorrow, and forever.
</p>

<div class="gallery">

<h2>Our Beautiful Memories 📸</h2>

<img src="photo1.jpg">
<img src="photo2.jpg">
<img src="photo3.jpg">

</div>

<button onclick="openHeart()">Open My Heart ❤️</button>

<h2 id="loveText">❤️ I LOVE YOU WIFEY ❤️</h2>

<footer>
Forever Yours ❤️
</footer>

<script>

function openHeart(){

document.getElementById("loveText").style.display="block";

for(let i=0;i<120;i++){

let element=document.createElement("div");

let symbols=["❤️","🌸","💖","🌹","💐","🌺"];

element.innerHTML=symbols[Math.floor(Math.random()*symbols.length)];

element.classList.add("fall");

element.style.left=Math.random()*100+"vw";

element.style.fontSize=(20+Math.random()*40)+"px";

element.style.animationDuration=(3+Math.random()*3)+"s";

document.body.appendChild(element);

setTimeout(()=>{
element.remove();
},6000);

}

}

function floatingHearts(){

let heart=document.createElement("div");

heart.innerHTML="❤️";

heart.classList.add("heart-bg");

heart.style.left=Math.random()*100+"vw";

heart.style.fontSize=(10+Math.random()*20)+"px";

document.body.appendChild(heart);

setTimeout(()=>{
heart.remove();
},8000);

}

setInterval(floatingHearts,500);

</script>

</body>
</html>
